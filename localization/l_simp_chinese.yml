 je_credit_currency_reason: "通过引入信用货币体系，银行提供贷款以促进经济发展.\n债务总额: #v [ROOT.GetCountry.MakeScope.Var('total_debt').GetValue|D]#!\n杠杆率: #v [ROOT.GetCountry.MakeScope.Var('cached_leverage_rate').GetValue|%2]#!\n周转速率：#v [ROOT.GetCountry.MakeScope.Var('turnover_amount').GetValue|D]#!\n债务上限: #tooltippable;tooltip:cb_debt_bound_formula_tt #v [ROOT.GetCountry.MakeScope.Var('cached_debt_bound').GetValue|D]#!#!\n实际利率: #tooltippable;tooltip:cb_real_interest_formula_tt #v [ROOT.GetCountry.MakeScope.Var('cached_real_interest_rate').GetValue|%2]#!#!"
 cb_debt_bound_formula_tt: "#header 债务上限公式#!\n$TOOLTIP_DELIMITER$\n债务上限 = 银行准备金 / 准备金率 + 1\n当前代入:\n= [ROOT.GetCountry.MakeScope.Var('bank_reserves').GetValue|D] / [ROOT.GetCountry.MakeScope.Var('reserves_rate').GetValue|2] + 1\n= #v [ROOT.GetCountry.MakeScope.Var('cached_debt_bound').GetValue|D]#!"
 cb_real_interest_formula_tt: "#header 实际利率公式#!\n$TOOLTIP_DELIMITER$\n实际利率 = 基准利率 × 银行利率系数 × 风险溢价系数 × 贸易因子\n当前代入:\n= 4% × [ROOT.GetCountry.MakeScope.Var('bank_interest_rate_factor').GetValue|2] × [ROOT.GetCountry.MakeScope.Var('cached_risk_premium_factor').GetValue|2] × [ROOT.GetCountry.MakeScope.Var('cached_trade_deficit_factor').GetValue|2]\n= #v [ROOT.GetCountry.MakeScope.Var('cached_real_interest_rate').GetValue|%2]#!"
 debt_amount_progress_bar: "债务总额"
 debt_amount_progress_bar_desc: "债务总量占上限: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%]#!"
