 je_credit_currency: "信用货币体系"
 je_credit_currency_reason: "通过引入信用货币体系，银行提供贷款以促进经济发展.\n债务总额: #v [ROOT.GetCountry.MakeScope.Var('total_debt').GetValue|D]#!\n杠杆率: #v [ROOT.GetCountry.MakeScope.Var('cached_leverage_rate').GetValue|%2]#!\n周转速率：#v [ROOT.GetCountry.MakeScope.Var('turnover_amount').GetValue|D]#!\n债务上限 = #v #tooltippable;tooltip:bank_reserves_tt [ROOT.GetCountry.MakeScope.Var('bank_reserves').GetValue|D]#!#! / #v #tooltippable;tooltip:reserves_rate_tt [ROOT.GetCountry.MakeScope.Var('reserves_rate').GetValue|%2]#!#! +1 = #v #tooltippable;tooltip:debt_bound_tt [ROOT.GetCountry.MakeScope.Var('cached_debt_bound').GetValue|D]#!#!\n实际利率 = 4% × #v #tooltippable;tooltip:bank_interest_rate_factor_tt [ROOT.GetCountry.MakeScope.Var('bank_interest_rate_factor').GetValue|2]#!#! × #v #tooltippable;tooltip:risk_premium_factor_tt [ROOT.GetCountry.MakeScope.Var('cached_risk_premium_factor').GetValue|2]#!#! × #v #tooltippable;tooltip:trade_deficit_factor_tt [ROOT.GetCountry.MakeScope.Var('cached_trade_deficit_factor').GetValue|2]#!#! = #v #tooltippable;tooltip:real_interest_rate_tt [ROOT.GetCountry.MakeScope.Var('cached_real_interest_rate').GetValue|%2]#!#!"
 bank_reserves_tt: "#header 银行准备金#!\n$TOOLTIP_DELIMITER$\n银行持有的准备金数量，影响债务上限的计算."
 reserves_rate_tt: "#header 准备金率#!\n$TOOLTIP_DELIMITER$\n银行必须持有的准备金占其总存款的比例，影响债务上限的计算."
 debt_bound_tt: "#header 债务上限#!\n$TOOLTIP_DELIMITER$\n债务上限 = 银行准备金 / 准备金率 + 1."
 bank_interest_rate_factor_tt: "#header 银行利率系数#!\n$TOOLTIP_DELIMITER$\n由银行生产方式加权决定，反映货币政策立场."
 risk_premium_factor_tt: "#header 风险溢价系数#!\n$TOOLTIP_DELIMITER$\n由信用水平与杠杆率决定，杠杆越高、信用越低，系数越高."
 trade_deficit_factor_tt: "#header 贸易因子#!\n$TOOLTIP_DELIMITER$\n用于反映贸易逆差对利率的修正（汇率模块还没做，这个固定为1）."
 real_interest_rate_tt: "#header 实际利率#!\n$TOOLTIP_DELIMITER$\n实际利率 = 4% × 银行利率系数 × 风险溢价系数 × 贸易因子."
 debt_amount_progress_bar: "债务总额"
 debt_amount_progress_bar_desc: "债务总量占上限: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%]#!"
 credit_level_modifier: "信用水平修正"
 broke_progress_bar: "破产进度"
 broke_progress_bar_desc: "每周投资池毛收入无法偿还利息时，破产进度增加1."
